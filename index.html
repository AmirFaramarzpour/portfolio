    video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        object-fit: cover;
    }
    .slideshow-container {
        max-width: 100%;
        position: relative;
        margin: auto;
    }
    .mySlides {
        display: none;
        text-align: center;
    }
    .prev, .next {
        cursor: pointer;
        position: absolute;
        top: 50%;
        width: auto;
        margin-top: -22px;
        padding: 16px;
        color: white;
        font-weight: bold;
        font-size: 18px;
        transition: 0.6s ease;
        border-radius: 0 3px 3px 0;
        user-select: none;
    }
    .next {
        right: 0;
        border-radius: 3px 0 0 3px;
    }
    .prev:hover, .next:hover {
        background-color: rgba(0,0,0,0.8);
    }
    .text {
        color: #f2f2f2;
        font-size: 15px;
        padding: 8px 12px;
        position: absolute;
        bottom: 8px;
        width: 100%;
        text-align: center;
    }
    .phone-frame {
        width: 300px;
        height: 600px;
        border: 16px solid black;
        border-radius: 36px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        margin: 20px;
    }
    .phone-frame::before {
        content: '';
        display: block;
        width: 60px;
        height: 30px;
        background: black;
        border-radius: 0 0 20px 20px;
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%);
    }
    .website {
        width: 100%;
        height: 100%;
        border: none;
    }
    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
    }
